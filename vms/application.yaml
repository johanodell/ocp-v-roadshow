apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openshift-virt-roadshow
  namespace: openshift-gitops
spec:
  destination:
    namespace: 00-ocp-v-roadshow
    server: https://kubernetes.default.svc
  project: default
  source:
    path: vms
    repoURL: https://github.com/johanodell/ocp-v-roadshow.git
    targetRevision: HEAD
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
